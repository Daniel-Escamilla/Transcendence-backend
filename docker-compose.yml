services:
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nats-server:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3000
      NATS_SERVERS: ${NATS_SERVERS:-nats://nats-server:4222}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-5000}
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      - database
      - nats-server
      - auth
      - user
      - game
      - tournament

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      NATS_SERVERS: ${NATS_SERVERS:-nats://nats-server:4222}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      - database
      - nats-server

  user:
    build:
      context: .
      dockerfile: apps/user/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      NATS_SERVERS: ${NATS_SERVERS:-nats://nats-server:4222}
    depends_on:
      - database
      - nats-server

  game:
    build:
      context: .
      dockerfile: apps/game/Dockerfile
    env_file:
      - .env
    environment:
      NATS_SERVERS: ${NATS_SERVERS:-nats://nats-server:4222}
    depends_on:
      - nats-server

  tournament:
    build:
      context: .
      dockerfile: apps/tournament/Dockerfile
    env_file:
      - .env
    environment:
      NATS_SERVERS: ${NATS_SERVERS:-nats://nats-server:4222}
    depends_on:
      - nats-server

volumes:
  postgres_data:
